# Application bindings
# $terminal = uwsm-app -- xdg-terminal-exec
$terminal = kitty
$browser = omarchy-launch-browser

bindd = ALT, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = ALT SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = ALT SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = ALT SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
unbind = SUPER, SPACE
bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
bindd = CTRL, SPACE, Omarchy menu, exec, omarchy-launch-walker
unbind = CTRL SUPER, SPACE

unbind = ALT, H
unbind = ALT, K
unbind = ALT, J
unbind = ALT, L
unbind = ALT, I
unbind = ALT, LEFT
unbind = ALT, RIGHT
unbind = ALT, UP
unbind = ALT, DOWN
unbind = ALT, SPACE
unbind = ALT CTRL, Q
unbind = ALT SHIFT, H
unbind = ALT SHIFT, J
unbind = ALT SHIFT, K
unbind = ALT SHIFT, L
bindd = ALT SHIFT, I, Show key bindings, exec, omarchy-menu-keybindings

# macOS-style accent dead keys (both Alts work)
bindd = ALT, E, Dead acute (é á ó ú í), exec, wtype -k dead_acute
bindd = ALT, N, Dead tilde (ã õ ñ), exec, wtype -k dead_tilde
bindd = ALT, C, Cedilla ç, exec, wtype -k ccedilla
bindd = ALT SHIFT, C, Cedilla Ç, exec, wtype -k Ccedilla
bindd = ALT, U, Dead diaeresis (ü ö ä), exec, wtype -k dead_diaeresis
bindd = ALT, I, Dead circumflex (â ê ô), exec, wtype -k dead_circumflex
bindd = ALT, grave, Dead grave (à è ò), exec, wtype -k dead_grave
bindd = ALT, H, Move focus left, movefocus, l
bindd = ALT, L, Move focus right, movefocus, r
bindd = ALT, K, Move focus up, movefocus, u
bindd = ALT, J, Move focus down, movefocus, d
bindd = ALT, SPACE, Omarchy menu, exec, omarchy-menu
bindd = ALT SHIFT, H, Move window left, movewindow, l
bindd = ALT SHIFT, J, Move window down, movewindow, d
bindd = ALT SHIFT, K, Move window up, movewindow, u
bindd = ALT SHIFT, L, Move window right, movewindow, r
bindd = SUPER CTRL, Q, Suspend, exec, systemctl suspend

bindde = , Scroll_Lock, LG brightness down, exec, bash -c 'v=$(usb-hid-brightness | grep -oP "\d+$"); v=$((v-5400)); ((v<0)) && v=0; usb-hid-brightness $v'
bindde = , Pause, LG brightness up, exec, bash -c 'v=$(usb-hid-brightness | grep -oP "\d+$"); v=$((v+5400)); ((v>54000)) && v=54000; usb-hid-brightness $v'

bindd = CTRL SHIFT SUPER, 4, Screenshot to clipboard, exec, omarchy-cmd-screenshot clipboard 
